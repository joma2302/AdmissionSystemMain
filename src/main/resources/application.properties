server.port=8090
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.enabled=true
server.servlet.encoding.force=true
# ???????????? ??? ?????????????? ??????
server.servlet.session.cookie.http-only=true
spring.session.store-type=none

# ===== ??????????? ? MySQL (HikariCP ??? ????) =====
spring.datasource.url=jdbc:mysql://localhost:3306/admission_system?useUnicode=true&characterEncoding=UTF-8&serverTimezone=UTC&createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=74542474
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# HikariCP ? ??? ??????????
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000

# ===== FreeMarker =====
spring.freemarker.template-loader-path=classpath:/templates/
spring.freemarker.suffix=.ftl
spring.freemarker.charset=UTF-8
spring.freemarker.content-type=text/html;charset=UTF-8
spring.freemarker.expose-request-attributes=true
spring.freemarker.expose-session-attributes=false
spring.freemarker.expose-spring-macro-helpers=false

spring.mvc.throw-exception-if-no-handler-found=true

# ===== ??????????? (Caffeine) =====
spring.cache.type=caffeine
spring.cache.caffeine.spec=maximumSize=100,expireAfterWrite=10m

# ===== Actuator =====
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always
logging.level.org.example=DEBUG
logging.level.org.springframework.security=TRACE
logging.level.org.springframework.security.web.authentication=TRACE
